document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"en\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<title>Dreams of Darkness, Dreams of Light — Soren En<\u002Ftitle>\n<meta name=\"description\" content=\"Dreams of Darkness, Dreams of Light — the album by Soren En. Listen on YouTube, Spotify, and Apple Music, or subscribe to get the release first.\">\n\n<!-- OG: cover image (path relative to https://www.sorenen.com/) -->\n<meta property=\"og:type\" content=\"music.album\">\n<meta property=\"og:title\" content=\"Dreams of Darkness, Dreams of Light — Soren En\">\n<meta property=\"og:description\" content=\"The album by Soren En. Listen on YouTube, Spotify, and Apple Music, or subscribe to get the release first.\">\n<meta property=\"og:url\" content=\"https://www.sorenen.com/\">\n<meta property=\"og:image\" content=\"https://www.sorenen.com/assets/cover.jpg\">\n<meta name=\"twitter:card\" content=\"summary_large_image\">\n<meta name=\"twitter:title\" content=\"Dreams of Darkness, Dreams of Light — Soren En\">\n<meta name=\"twitter:description\" content=\"The album by Soren En. Listen on YouTube, Spotify, and Apple Music, or subscribe to get the release first.\">\n<meta name=\"twitter:image\" content=\"https://www.sorenen.com/assets/cover.jpg\">\n\n<!-- Favicon: half-moon circle, light half left / dark half right -->\n<link rel=\"icon\" href=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='48' fill='%23f2f2f0'/%3E%3Cpath d='M50 2 a48 48 0 0 1 0 96 Z' fill='%23141412'/%3E%3C/svg%3E\">\n\n<style>\n/* ============================================================\n   DREAMS OF DARKNESS, DREAMS OF LIGHT — SOREN EN\n   Monochrome one-pager. Two inks only:\n     --ink   near-black  #141412\n     --paper warm off-white #ECE9E1\n   Serif stack chosen to match the cover's classic serif caps.\n   ============================================================ */\n\n:root {\n  --ink:   #141412;\n  --paper: #f2f2f0;\n  --serif: Baskerville, \"Baskerville Old Face\", \"Palatino Linotype\",\n           Palatino, \"Times New Roman\", Times, serif;\n  --track-title: 0.32em;   /* letterspacing for large title caps */\n  --track-label: 0.42em;   /* letterspacing for small labels (SOREN EN style) */\n  --moon-base: 0deg;       /* cover orientation: light half left, dark half right */\n}\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\n\nhtml { scroll-behavior: smooth; }\n@media (prefers-reduced-motion: reduce) { html { scroll-behavior: auto; } }\n\nbody {\n  font-family: var(--serif);\n  background: var(--paper);\n  color: var(--ink);\n  -webkit-font-smoothing: antialiased;\n  overflow-x: hidden;\n}\n\n/* ---------- Accessibility helpers ---------- */\n\n.sr-only {\n  position: absolute; width: 1px; height: 1px;\n  overflow: hidden; clip: rect(0 0 0 0); white-space: nowrap;\n}\n\n.skip-link {\n  position: absolute; left: 50%; top: 0; transform: translate(-50%, -110%);\n  z-index: 100;\n  background: var(--paper); color: var(--ink);\n  border: 1px solid var(--ink);\n  padding: 0.6em 1.4em;\n  font-size: 0.8rem; letter-spacing: var(--track-label); text-transform: uppercase;\n  text-decoration: none;\n}\n.skip-link:focus-visible { transform: translate(-50%, 0); }\n\na:focus-visible,\nbutton:focus-visible {\n  outline: 2px solid currentColor;\n  outline-offset: 4px;\n}\n\n/* ============================================================\n   1. HERO — the cover, unfolded\n   ============================================================ */\n\n.hero {\n  position: relative;\n  height: 100vh;\n  height: 100svh;\n  /* hard vertical split: black left, paper right */\n  background: linear-gradient(90deg, var(--ink) 0 50%, var(--paper) 50% 100%);\n}\n\n.hero h1 {\n  font-weight: 400;\n  font-size: clamp(1.35rem, 3.2vw, 2.7rem);\n  line-height: 1.55;\n  letter-spacing: var(--track-title);\n  text-transform: uppercase;\n  text-align: center;\n}\n\n.title-half {\n  position: absolute;\n  top: 50%;\n  width: 50%;\n  transform: translateY(-50%);\n  display: block;\n  padding: 0 4vw;\n}\n.title-dark  { left: 0;  color: var(--paper); }\n.title-light { right: 0; color: var(--ink);   }\n\n/* Half-moon circle, centered on the seam.\n   Light half sits on the dark side; dark half on the light side. */\n.moon {\n  position: absolute;\n  left: 50%; top: 50%;\n  width: clamp(88px, 10vw, 144px);\n  aspect-ratio: 1;\n  margin: calc(clamp(88px, 10vw, 144px) / -2);\n  border-radius: 50%;\n  background: linear-gradient(90deg, var(--paper) 0 50%, var(--ink) 50% 100%);\n  transform: rotate(var(--moon-base));\n  will-change: transform;\n}\n\n/* Artist name, split across the seam like the cover */\n.artist {\n  position: absolute;\n  bottom: 9vh;\n  width: 100%;\n  display: flex;\n  font-size: clamp(1.05rem, 1.9vw, 1.6rem);\n  letter-spacing: var(--track-label);\n  text-transform: uppercase;\n}\n.artist span { width: 50%; text-align: center; position: relative; }\n.artist .soren { color: var(--paper); }\n.artist .en    { color: var(--ink);   }\n\n/* Horizontal line under SOREN, balancing the black half against\n   the section below (yin/yang counterweight) */\n.artist .soren::after {\n  content: \"\";\n  position: absolute;\n  left: 50%; right: 0; bottom: -1.6em;\n  transform: translateX(-50%);\n  width: 60%;\n  border-bottom: 1px solid currentColor;\n}\n\n/* Minimal scroll cue: small downward chevron on the seam.\n   mix-blend-mode keeps it monochrome-visible on both halves. */\n.scroll-cue {\n  position: absolute;\n  left: 50%; bottom: 3vh;\n  width: 16px; height: 16px;\n  transform: translateX(-50%) rotate(45deg);\n  border-right: 2px solid #fff;\n  border-bottom: 2px solid #fff;\n  mix-blend-mode: difference;\n}\n\n/* ============================================================\n   2. ABOUT — the darkness chapter\n   ============================================================ */\n\n.about {\n  background: var(--ink);\n  color: var(--paper);\n  min-height: 90vh;\n  display: grid;\n  place-items: center;\n  padding: 20vh 6vw;\n}\n\n.about h2.section-title {\n  font-weight: 700;\n  font-size: clamp(1.6rem, 3vw, 2.4rem);\n  letter-spacing: var(--track-title);\n  text-transform: uppercase;\n  margin-bottom: 2rem;\n  text-align: center;\n}\n\n.about p {\n  max-width: 58ch;\n  text-align: center;\n  font-size: clamp(1.05rem, 1.6vw, 1.3rem);\n  line-height: 2.1;\n  letter-spacing: 0.04em;\n}\n\n.about .scroll-cue-about {\n  margin-top: 5rem;\n  width: 16px; height: 16px;\n  transform: rotate(45deg);\n  border-right: 2px solid var(--paper);\n  border-bottom: 2px solid var(--paper);\n}\n\n/* ============================================================\n   3. LISTEN & FOLLOW — the light chapter\n   ============================================================ */\n\n.listen {\n  background: var(--paper);\n  color: var(--ink);\n  padding: 18vh 6vw 14vh;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: clamp(3rem, 7vh, 5rem);\n}\n\n/* Primary CTA — must outrank everything else here */\n.cta {\n  display: inline-block;\n  background: var(--ink);\n  color: var(--paper);\n  text-decoration: none;\n  text-transform: uppercase;\n  letter-spacing: var(--track-label);\n  font-size: clamp(0.95rem, 1.6vw, 1.3rem);\n  padding: 1.5em 3.2em;\n  text-align: center;\n  border: 1px solid var(--ink);\n}\n.cta:hover { background: var(--paper); color: var(--ink); }\n\n/* Secondary links */\n.links {\n  display: flex;\n  gap: clamp(0.9rem, 2vw, 1.6rem);\n  flex-wrap: wrap;\n  justify-content: center;\n}\n.links a {\n  display: inline-block;\n  color: var(--ink);\n  text-decoration: none;\n  text-transform: uppercase;\n  letter-spacing: var(--track-label);\n  font-size: clamp(0.75rem, 1.1vw, 0.9rem);\n  padding: 1em 2.2em;\n  border: 1px solid var(--ink);\n}\n.links a:hover { background: var(--ink); color: var(--paper); }\n\n/* QR codes — desktop/tablet only; hidden on mobile (buttons are the mobile path) */\n.qr-grid {\n  display: none;\n}\n@media (min-width: 768px) {\n  .qr-grid {\n    display: grid;\n    grid-template-columns: repeat(4, minmax(0, 1fr));\n    gap: clamp(1.5rem, 3vw, 3rem);\n    width: min(58rem, 100%);\n  }\n}\n\n.qr {\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  gap: 1.1rem;\n}\n.qr .qr-frame {\n  width: 100%;\n  aspect-ratio: 1 / 1;           /* fixed ratio: swapping the SVG causes zero layout shift */\n  border: 1px solid var(--ink);\n  padding: 8%;\n  background: #fff;              /* QR quiet zone; still monochrome */\n}\n.qr img { display: block; width: 100%; height: 100%; }\n.qr figcaption {\n  font-size: 0.72rem;\n  letter-spacing: var(--track-label);\n  text-transform: uppercase;\n  text-indent: var(--track-label); /* optically recenters letterspaced caps */\n}\n\n/* ============================================================\n   4. FOOTER\n   ============================================================ */\n\nfooter {\n  background: var(--paper);\n  color: var(--ink);\n  text-align: center;\n  padding: 4rem 6vw 3rem;\n  font-size: 0.72rem;\n  letter-spacing: var(--track-label);\n  text-transform: uppercase;\n  text-indent: var(--track-label);\n}\n\n/* ============================================================\n   THE ONE ANIMATION — moon rotates 180° with scroll\n   (darkness turning into light)\n   ============================================================ */\n\n@keyframes moon-turn {\n  from { transform: rotate(var(--moon-base)); }\n  to   { transform: rotate(calc(var(--moon-base) + 180deg)); }\n}\n\n@media (prefers-reduced-motion: no-preference) {\n  @supports (animation-timeline: scroll()) {\n    .moon {\n      animation: moon-turn linear both;\n      animation-timeline: scroll(root);\n      /* completes as the Listen section arrives */\n      animation-range: 0% 80%;\n    }\n  }\n}\n\n/* ============================================================\n   MOBILE (portrait) — the split rotates to horizontal:\n   dark top, light bottom\n   ============================================================ */\n\n@media (max-width: 767px) {\n  :root { --moon-base: 90deg; } /* light half rotates to the top (dark side) */\n\n  .hero {\n    background: linear-gradient(180deg, var(--ink) 0 50%, var(--paper) 50% 100%);\n  }\n\n  .hero h1 { font-size: clamp(1.15rem, 5.4vw, 1.6rem); }\n\n  .title-half {\n    width: 100%;\n    left: 0; right: 0;\n    padding: 0 8vw;\n    transform: none;\n  }\n  .title-dark  { top: 21%; }\n  .title-light { top: auto; bottom: 27%; }\n\n  .artist {\n    bottom: 8vh;\n    justify-content: center;\n    gap: 0.42em; /* matches letterspacing: reads as one name */\n  }\n  .artist span { width: auto; }\n  .artist .soren { color: var(--ink); } /* bottom half is light on mobile */\n}\n<\u002Fstyle>\n<\u002Fhead>\n\n\n\n<body>\n<a class=\"skip-link\" href=\"#main\">Skip to content<\u002Fa>\n\n<!-- ============ 1. HERO ============ -->\n<header class=\"hero\">\n  <h1>\n    <span class=\"title-half title-dark\">Dreams<br>of<br>Darkness<\u002Fspan>\n    <span class=\"title-half title-light\">Dreams<br>of<br>Light<\u002Fspan>\n  <\u002Fh1>\n\n  <div class=\"moon\" id=\"moon\" aria-hidden=\"true\"><\u002Fdiv>\n\n  <p class=\"artist\">\n    <span class=\"soren\">Soren<\u002Fspan><span class=\"en\">En<\u002Fspan>\n  <\u002Fp>\n\n  <div class=\"scroll-cue\" aria-hidden=\"true\"><\u002Fdiv>\n<\u002Fheader>\n\n<main id=\"main\">\n\n  <!-- ============ 2. ABOUT ============ -->\n  <section class=\"about\" aria-labelledby=\"about-heading\">\n    <div>\n      <!-- TITLE: replace -->\n      <h2 id=\"about-heading\" class=\"section-title\">The Album<\u002Fh2>\n      <!-- BLURB: replace -->\n      <p>\n        Dreams of Darkness, Dreams of Light is a record written between two\n        hours of the night&nbsp;— the one where everything ends and the one\n        where everything begins. Placeholder text: replace this blurb with the\n        final album description before launch.\n      <\u002Fp>\n      <div class=\"scroll-cue-about\" aria-hidden=\"true\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ 3. LISTEN & FOLLOW ============ -->\n  <section class=\"listen\" aria-labelledby=\"listen-heading\">\n    <h2 id=\"listen-heading\" class=\"sr-only\">Listen and follow<\u002Fh2>\n\n    <!-- Primary CTA -->\n    <a class=\"cta\" href=\"https://www.sorenen.com/subscribe\" target=\"_blank\" rel=\"noopener\" aria-label=\"Subscribe to get the release first, opens in new tab\">Get the Release First<\u002Fa>\n\n    <!-- Secondary links -->\n    <nav class=\"links\" aria-label=\"Streaming platforms\">\n      <a href=\"https://www.sorenen.com/youtube\" target=\"_blank\" rel=\"noopener\" aria-label=\"Watch Soren En on YouTube, opens in new tab\">YouTube<\u002Fa>\n      <a href=\"https://www.sorenen.com/spotify\" target=\"_blank\" rel=\"noopener\" aria-label=\"Listen to Soren En on Spotify, opens in new tab\">Spotify<\u002Fa>\n      <a href=\"https://www.sorenen.com/applemusic\" target=\"_blank\" rel=\"noopener\" aria-label=\"Listen to Soren En on Apple Music, opens in new tab\">Apple Music<\u002Fa>\n    <\u002Fnav>\n\n    <!-- QR codes (shown on viewports ≥768px only) -->\n    <div class=\"qr-grid\">\n      <!-- QR: subscribe -->\n      <figure class=\"qr\">\n        <div class=\"qr-frame\"><img src=\"e041332b-7405-42a6-a902-e52a868e5f08\" alt=\"QR code linking to the Soren En subscribe page\"><\u002Fdiv>\n        <figcaption>Subscribe<\u002Ffigcaption>\n      <\u002Ffigure>\n      <!-- QR: youtube -->\n      <figure class=\"qr\">\n        <div class=\"qr-frame\"><img src=\"4d480b39-21f0-468f-b688-1b4b860c69df\" alt=\"QR code linking to Soren En on YouTube\"><\u002Fdiv>\n        <figcaption>YouTube<\u002Ffigcaption>\n      <\u002Ffigure>\n      <!-- QR: spotify -->\n      <figure class=\"qr\">\n        <div class=\"qr-frame\"><img src=\"62f020da-2095-4d2a-b88e-c1329c2f246b\" alt=\"QR code linking to Soren En on Spotify\"><\u002Fdiv>\n        <figcaption>Spotify<\u002Ffigcaption>\n      <\u002Ffigure>\n      <!-- QR: apple music -->\n      <figure class=\"qr\">\n        <div class=\"qr-frame\"><img src=\"0949f0a4-0c50-416c-9fdc-e58864d79cfa\" alt=\"QR code linking to Soren En on Apple Music\"><\u002Fdiv>\n        <figcaption>Apple Music<\u002Ffigcaption>\n      <\u002Ffigure>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n<\u002Fmain>\n\n<!-- ============ 4. FOOTER ============ -->\n<footer>\n  <p>© 2026 Bryan Nippers (Soren En)<\u002Fp>\n<\u002Ffooter>\n\n<script>\n/* Scroll fallback for the moon rotation — only runs where CSS\n   scroll-driven animations are unsupported, and never for\n   reduced-motion users. Rotation transform only. */\n(function () {\n  var reduced = window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n  var supported = window.CSS && CSS.supports && CSS.supports(\"animation-timeline: scroll()\");\n  if (reduced || supported) return;\n\n  var moon = document.getElementById(\"moon\");\n  var ticking = false;\n\n  function update() {\n    ticking = false;\n    var max = (document.documentElement.scrollHeight - window.innerHeight) * 0.8;\n    var progress = max > 0 ? Math.min(window.scrollY / max, 1) : 0;\n    var base = window.matchMedia(\"(max-width: 767px)\").matches ? 90 : 0;\n    moon.style.transform = \"rotate(\" + (base + progress * 180) + \"deg)\";\n  }\n\n  window.addEventListener(\"scroll\", function () {\n    if (!ticking) { ticking = true; requestAnimationFrame(update); }\n  }, { passive: true });\n  window.addEventListener(\"resize\", update);\n  update();\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
